name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout firmware repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout StopWatch skill
        uses: actions/checkout@v4
        with:
          repository: xuruiray/stopwatch-skill
          path: _external/stopwatch-skill

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: bash scripts/build-pages.sh
        env:
          STOPWATCH_SKILL_DIR: ${{ github.workspace }}/_external/stopwatch-skill

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
